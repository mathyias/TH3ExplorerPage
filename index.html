<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>TH3 | Cyber-Liquid Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header>
        <div class="logo">TH3</div>
        <div class="network-pill"><div class="pulse"></div>ONLINE</div>
    </header>

    <main>
        <section class="hero-card">
            <h1>TH3 Explorer</h1>
            <div class="search-wrapper">
                <input id="searchInput" type="text" placeholder="Wpisz wysokość bloku...">
                <button id="searchBtn">SEARCH</button>
            </div>
        </section>

        <section class="stats-grid">
            <div class="glass-card"><span>HEIGHT</span><h2 id="height">---</h2></div>
            <div class="glass-card"><span>PEERS</span><h2 id="peers">---</h2></div>
            <div class="glass-card"><span>DIFFICULTY</span><h2 id="difficulty">---</h2></div>
        </section>

        <section class="content-grid">
            <div class="glass-panel">
                <div class="panel-header">LATEST BLOCKS</div>
                <div id="blocksContainer"></div>
            </div>
            <div class="glass-panel">
                <div class="panel-header">BLOCK DETAILS</div>
                <div id="blockDetails">Wybierz blok z listy.</div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
