<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TH3 | Liquid Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header>
        <div class="logo">TH3</div>
        <div class="status">● ONLINE</div>
    </header>

    <main>
        <section class="hero">
            <h1>Liquid Explorer</h1>
            <div class="search">
                <input id="searchInput" type="text" placeholder="Wpisz wysokość bloku...">
                <button id="searchBtn">SZUKAJ</button>
            </div>
        </section>

        <section class="stats">
            <div class="card"><span>HEIGHT</span><h2 id="height">--</h2></div>
            <div class="card"><span>PEERS</span><h2 id="peers">--</h2></div>
            <div class="card"><span>DIFFICULTY</span><h2 id="difficulty">--</h2></div>
        </section>

        <section class="grid">
            <div class="panel">
                <h3>LATEST BLOCKS</h3>
                <div id="blocksContainer"></div>
            </div>
            <div class="panel">
                <h3>DETAILS</h3>
                <div id="blockDetails">Wybierz blok z listy...</div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
