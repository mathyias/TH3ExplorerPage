<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>TH3 | Liquid System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
    <header>
        <div style="font-weight:700; font-size:24px;">TH3 Explorer</div>
        <div style="font-size:12px; color:rgba(255,255,255,0.6);">● SYSTEM ONLINE</div>
    </header>

    <section class="glass" style="margin-bottom:20px;">
        <h1 style="margin:0 0 20px 0;">Liquid Intelligence</h1>
        <div style="display:flex; gap:10px;">
            <input id="searchInput" placeholder="Wpisz wysokość...">
            <button id="searchBtn">Szukaj</button>
        </div>
    </section>

    <div class="grid-layout">
        <div class="glass" id="blocksContainer" style="overflow-y:auto; max-height:60vh;"></div>
        <div class="glass" id="blockDetails">Wybierz blok z listy...</div>
    </div>
</main>
<script src="app.js"></script>
</body>
</html>
