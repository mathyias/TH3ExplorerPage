<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TH3 Explorer</title>

    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>
<body>

<div class="container">

    <header>
        <h1>TH3 Explorer</h1>
        <p>Official TH3 Blockchain Explorer</p>
    </header>

    <section class="stats">

        <div class="card">
            <h3>Height</h3>
            <span id="height">Loading...</span>
        </div>

        <div class="card">
            <h3>Peers</h3>
            <span id="peers">Loading...</span>
        </div>

        <div class="card">
            <h3>Difficulty</h3>
            <span id="difficulty">Loading...</span>
        </div>

    </section>

    <section class="blocks-section">

        <h2>Latest Blocks</h2>

        <table>
            <thead>
                <tr>
                    <th>Height</th>
                    <th>Hash</th>
                    <th>Transactions</th>
                </tr>
            </thead>

            <tbody id="blocksTable">
            </tbody>

        </table>

    </section>

</div>

</body>
</html>
