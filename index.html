<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TH3 | Liquid Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <header>
        <div class="logo">TH3</div>
        <div class="network-pill">
            <div class="pulse"></div>
            <span>LIVE</span>
        </div>
    </header>

    <main>
        <section class="hero-card">
            <span class="tag">TH3 BLOCKCHAIN</span>
            <h1>Liquid Explorer</h1>
            <div class="search-wrapper">
                <input id="searchInput" type="text" placeholder="Wyszukaj wysokość bloku...">
                <button id="searchBtn">Szukaj</button>
            </div>
        </section>

        <section class="stats-grid" id="stats">
            <div class="glass-card"><span>HEIGHT</span><h2 id="height">-</h2></div>
            <div class="glass-card"><span>PEERS</span><h2 id="peers">-</h2></div>
            <div class="glass-card"><span>DIFFICULTY</span><h2 id="difficulty">-</h2></div>
        </section>

        <section class="content-grid">
            <div class="glass-panel"><div class="panel-header">Latest Blocks</div><div id="blocksContainer"></div></div>
            <div class="glass-panel"><div class="panel-header">Details</div><div id="blockDetails">Wybierz blok...</div></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
