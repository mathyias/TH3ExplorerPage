<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TH3 | Liquid Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header>
        <div class="logo">TH3</div>
        <div class="network-pill">LIVE</div>
    </header>

    <main>
        <section class="hero-card">
            <h1>Explorer</h1>
            <div class="search-wrapper">
                <input id="searchInput" type="text" placeholder="Height...">
                <button id="searchBtn">SEARCH</button>
            </div>
        </section>

        <section class="stats-grid">
            <div class="glass-card"><span>HEIGHT</span><h2 id="height">0</h2></div>
            <div class="glass-card"><span>PEERS</span><h2 id="peers">0</h2></div>
        </section>

        <section class="content-grid">
            <div class="glass-panel" id="blocksContainer"></div>
            <div class="glass-panel" id="blockDetails">Wybierz blok...</div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
