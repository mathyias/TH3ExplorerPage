<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TH3 Explorer</title>

<link rel="stylesheet" href="style.css">
<script defer src="app.js"></script>
</head>

<body>

<div class="bg"></div>

<nav>
    <div class="logo">TH3</div>

```
<div class="network-status">
    <span class="status-dot"></span>
    Network Online
</div>
```

</nav>

<section class="hero">

```
<div class="hero-content">

    <h1>TH3</h1>

    <h2>Explore Information</h2>

    <p>
        The value of information.
    </p>

    <div class="search-container">

        <input
            id="searchInput"
            type="text"
            placeholder="Search block height...">

        <button id="searchBtn">
            Search
        </button>

    </div>

</div>
```

</section>

<section class="stats">

```
<div class="glass-card">
    <span>HEIGHT</span>
    <h3 id="height">...</h3>
</div>

<div class="glass-card">
    <span>PEERS</span>
    <h3 id="peers">...</h3>
</div>

<div class="glass-card">
    <span>DIFFICULTY</span>
    <h3 id="difficulty">...</h3>
</div>
```

</section>

<section class="blocks-wrapper">

```
<div class="section-header">

    <h2>Latest Blocks</h2>

    <span>Live blockchain feed</span>

</div>

<div id="blocksContainer">

</div>
```

</section>

<section class="block-details">

```
<div id="blockDetails">

    Select block to view details

</div>
```

</section>

<footer>

```
<div>
    TH3 Blockchain Explorer
</div>

<div>
    Powered by api.th3chain.cloud
</div>
```

</footer>

</body>
</html>
