<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020617">
<title>TH3 Explorer</title>
<link rel="stylesheet" href="/style.css">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta property="og:title" content="TH3 Explorer">
<meta property="og:image" content="https://explorer.th3chain.cloud/assets/th3-logo.png?v=3">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TH3 Explorer">
<meta name="twitter:image" content="https://explorer.th3chain.cloud/assets/th3-logo.png?v=3">

</head>
<body>
<div class="app-wrapper">
  <div class="main-container">
    <header class="glass-box explorer-header">
      <div class="explorer-brand">
        <img src="/assets/th3-logo.png?v=3" alt="TH3Chain">
        <div>
          <h1>Explorer</h1>
          <p class="header-subtitle">Blocks, transactions, addresses and UTXO</p>
        </div>
      </div>
      <div class="status-pill" id="networkStatus">● Loading</div>
    </header>

    <section class="glass-box search-bar">
      <input id="searchInput" placeholder="Search block height, txid or address" autocomplete="off">
      <button id="searchBtn">Search</button>
    </section>

    <section class="stats-row">
      <div class="stat-card"><span>Height</span><strong id="statHeight">-</strong></div>
      <div class="stat-card"><span>Peers</span><strong id="statPeers">-</strong></div>
      <div class="stat-card"><span>Difficulty</span><strong id="statDifficulty">-</strong></div>
    </section>

    <div class="grid-layout">
      <div class="glass-box" id="blocksContainer">
        <h3>Latest Blocks</h3>
      </div>

      <div class="glass-box" id="blockDetails">
        <h3>System Ready</h3>
        <p class="empty-text">Search for a block, transaction or address.</p>
      </div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
